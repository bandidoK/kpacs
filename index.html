<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Banner</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f5f5f5;
        }
        .hero img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
        }
        @media (max-width: 768px) {
            .hero {
                height: 50vh;
            }
            .hero img {
                width: 90%;
            }
        }
        @media (min-width: 769px) and (max-width: 1200px) {
            .hero {
                height: 70vh;
            }
            .hero img {
                width: 80%;
            }
        }
        @media (min-width: 1201px) {
            .hero {
                height: 100vh;
            }
            .hero img {
                width: 70%;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <img src="team.jpg" alt="Team Image">
    </div>
</body>
</html>
